version: 2

before:
  hooks:
    - go mod tidy

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -X github.com/torreirow/soltty/cmd.version={{.Version}}
    binary: soltty-{{.Os}}-{{.Arch}}

archives:
  - format: tar.gz
    format_overrides:
      - goos: windows
        format: zip
    name_template: "soltty-{{.Version}}-{{.Os}}-{{.Arch}}"

checksum:
  name_template: 'checksums.txt'

release:
  github:
    owner: torreirow
    name: soltty
